services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lovelifts3v3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lovelifts3v3
      AUTH_SECRET: dev-secret-change-in-production
      AUTH_URL: http://localhost:3002
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
